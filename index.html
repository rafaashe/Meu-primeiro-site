<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌈 Galeria Infantil · 50 atividades</title>
    <style>
        /* ===== RESET SUAVE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Comic Sans MS', 'Chalkboard', cursive, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f9eec1 0%, #fff2d9 100%);
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        /* cabeçalho brincante */
        .cabecalho-galeria {
            text-align: center;
            margin-bottom: 3rem;
        }

        .cabecalho-galeria h1 {
            font-size: 3.2rem;
            letter-spacing: 2px;
            color: #3b2b1f;
            text-shadow: 4px 4px 0 #ffb347, 6px 6px 0 rgba(255, 140, 0, 0.3);
            margin-bottom: 0.5rem;
            word-break: break-word;
        }

        .cabecalho-galeria p {
            font-size: 1.5rem;
            background: #fef7e6;
            display: inline-block;
            padding: 0.5rem 2.5rem;
            border-radius: 60px;
            box-shadow: 0 8px 0 #d4a373;
            color: #5a3e2b;
            font-weight: 600;
            border: 2px solid #f5b342;
        }

        .cabecalho-galeria p span {
            background: #fdd98b;
            border-radius: 50%;
            padding: 0.2rem 0.9rem;
            margin-left: 0.6rem;
            font-size: 1.8rem;
        }

        /* grade principal — 50 quadros */
        .grade-atividades {
            display: grid;
            grid-template-columns: repeat(5, 1fr);  /* 5 colunas = 10 linhas (5x10 = 50) */
            gap: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
            justify-content: center;
        }

        /* cada cartão de atividade */
        .cartao {
            background: #fffef8;
            border-radius: 35px 35px 25px 25px;
            box-shadow: 0 15px 0 #c7b59e, 0 20px 20px -8px rgba(110, 70, 30, 0.3);
            padding: 1.2rem 0.8rem 0.8rem 0.8rem;
            transition: all 0.2s ease;
            border: 3px solid #ffb882;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* efeito divertido ao levantar */
        .cartao:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 0 #b28b5e, 0 25px 25px -6px #7b5839;
            border-color: #ff9f4b;
        }

        /* moldura da imagem */
        .moldura {
            width: 100%;
            aspect-ratio: 1 / 1;  /* quadradinho perfeito */
            background: #ffe2c1;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px dashed #f4b886;
            padding: 0.3rem;
            box-shadow: inset 0 -3px 0 #dba478;
        }

        /* a imagem infantil (placeholder) */
        .moldura img {
            width: 100%;
            height: 100%;
            object-fit: cover;      /* cobre toda a área sem distorcer */
            border-radius: 22px;
            background: #fdf4e0;
            display: block;
            border: 2px solid #fff1b5;
            transition: 0.2s;
        }

        /* Nome da atividade (pequeno e doce) */
        .cartao figcaption {
            margin-top: 0.9rem;
            font-size: 1rem;
            font-weight: 600;
            color: #4f3a26;
            background: #fff1cf;
            width: 100%;
            padding: 0.4rem 0.2rem;
            border-radius: 30px;
            border: 2px solid #fdc78a;
            box-shadow: 0 4px 0 #e7ac6e;
            transition: 0.1s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* texto escondido só pra acessibilidade (mostra o link) */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        /* responsividade: tablets */
        @media (max-width: 900px) {
            .grade-atividades {
                grid-template-columns: repeat(4, 1fr); /* 4 colunas: 13 linhas (4x13=52, mas aparecem 50) */
                gap: 1.2rem;
            }
            .cabecalho-galeria h1 {
                font-size: 2.8rem;
            }
        }

        @media (max-width: 600px) {
            body { padding: 1rem; }
            .grade-atividades {
                grid-template-columns: repeat(3, 1fr); /* 3 colunas: 17 linhas (3x17=51, mas mostra 50) */
                gap: 1rem;
            }
            .cabecalho-galeria h1 {
                font-size: 2.2rem;
            }
            .cartao figcaption {
                font-size: 0.8rem;
            }
        }

        @media (max-width: 400px) {
            .grade-atividades {
                grid-template-columns: repeat(2, 1fr); /* 2 colunas: 25 linhas = 50 perfeito */
            }
        }

        /* um toque lúdico no fundo */
        .emojis-flutuantes {
            pointer-events: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.2;
            font-size: 3rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            align-content: space-around;
            padding: 1rem;
            color: #ffc491;
        }
    </style>
</head>
